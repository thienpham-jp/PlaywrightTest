name: Playwright Tests

on:
  schedule:
    - cron: "0 4 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    timeout-minutes: 120
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: |
          echo "version=$(npm ls @playwright/test --json | node -e "const d=require('/dev/stdin');console.log(d.dependencies?.['@playwright/test']?.version||'')")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # ── Restore Allure history từ lần chạy trước (để có Trend) ──
      - name: Download previous Allure history
        uses: actions/download-artifact@v7
        with:
          name: allure-history
          path: allure-results/history
        continue-on-error: true

      # ── Chạy test: config CI tự sinh cả playwright-report/ (html) và allure-results/ ──
      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true

      # ── Generate Allure Report từ allure-results ──
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Ensure Allure results exist
        if: always()
        run: mkdir -p allure-results

      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Ensure Allure report directory exists
        if: always()
        run: |
          if [ ! -f "allure-report/index.html" ]; then
            mkdir -p allure-report
            echo '<html><body><h1>No report generated</h1><p>Tests may have timed out or crashed before report was written.</p></body></html>' > allure-report/index.html
          fi

      - name: Ensure Playwright html report directory exists
        if: always()
        run: |
          if [ ! -f "playwright-report/index.html" ]; then
            mkdir -p playwright-report
            echo '<html><body><h1>No report generated</h1><p>Tests may have timed out or crashed before report was written.</p></body></html>' > playwright-report/index.html
          fi

      # ── Lưu Allure history cho lần chạy tiếp theo (để có Trend) ──
      - name: Upload Allure history
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-history
          path: allure-report/history
          retention-days: 90

      # ── Artifact: Allure Report (ZIP download) ──
      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      # ── Artifact: Playwright HTML report (ZIP download) ──
      - name: Upload Playwright html report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # ── Pages chỉ deploy được 1 site → dùng Allure làm trang chính, kèm HTML report ở subfolder ──
      - name: Combine reports for Pages
        if: always()
        run: |
          mkdir -p pages-deploy
          cp -r allure-report/. pages-deploy/
          mkdir -p pages-deploy/playwright-report
          cp -r playwright-report/. pages-deploy/playwright-report/

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages-deploy/

  deploy:
    needs: test
    if: always() && needs.test.result != 'skipped'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
